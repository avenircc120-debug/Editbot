<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Editbot — Mes compétitions</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, sans-serif; background:#0f1117; color:#e2e8f0; padding:24px; }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p.sub { color:#94a3b8; margin-top:0; margin-bottom: 24px; }
  .card { background:#1a1f2e; border:1px solid #2d3748; border-radius:14px; padding:20px; margin-bottom:20px; }
  .card h2 { font-size:16px; margin-top:0; }
  label.chk { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #232838; font-size:14px; }
  label.chk:last-child { border-bottom:none; }
  input[type=checkbox] { width:18px; height:18px; }
  button { width:100%; padding:12px; border:none; border-radius:8px; background:#3b82f6; color:#fff; font-weight:600; font-size:14px; cursor:pointer; }
  button:hover { background:#2563eb; }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#22c55e; color:#04240f; padding:10px 18px; border-radius:8px; font-size:14px; display:none; }
  .error { color:#f87171; text-align:center; margin-top:60px; }
</style>
</head>
<body>
<div class="wrap" id="app">Chargement...</div>
<div class="toast" id="toast"></div>
<script>
const tg = window.Telegram?.WebApp;
tg?.ready();
tg?.expand();

const params = new URLSearchParams(location.search);
const token = params.get('token');
const API_BASE = window.EDITBOT_API_BASE || 'https://jxrwgcsbomqvvchvkkdt.supabase.co/functions/v1/web-portal';

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2200);
}

async function api(method, body) {
  const res = await fetch(`${API_BASE}?token=${encodeURIComponent(token)}`, {
    method, headers: { 'Content-Type': 'application/json' }, body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error('Erreur API');
  return res.json();
}

function render(data) {
  const app = document.getElementById('app');
  app.innerHTML = `
    <h1>🏆 Mes compétitions</h1>
    <p class="sub">Choisis les compétitions que tu veux suivre.</p>
    <div class="card">
      <div id="leagues"></div>
      <button id="saveLeagues" style="margin-top:14px;">Enregistrer mes compétitions</button>
    </div>
  `;

  const leaguesDiv = document.getElementById('leagues');
  data.leagues.forEach((l) => {
    const checked = data.selectedCompetitions.includes(l);
    leaguesDiv.insertAdjacentHTML('beforeend',
      `<label class="chk"><input type="checkbox" value="${l}" ${checked ? 'checked' : ''}/> ${l}</label>`);
  });

  document.getElementById('saveLeagues').onclick = async () => {
    const selected = [...leaguesDiv.querySelectorAll('input:checked')].map((i) => i.value);
    await api('POST', { competitions: selected });
    toast('Compétitions enregistrées ✅');
    tg?.HapticFeedback?.notificationOccurred?.('success');
  };
}

async function load() {
  if (!token) {
    document.getElementById('app').innerHTML = '<p class="error">Lien invalide. Reviens sur Telegram et réessaie.</p>';
    return;
  }
  try {
    const data = await api('GET');
    render(data);
  } catch (e) {
    document.getElementById('app').innerHTML = '<p class="error">Impossible de charger tes compétitions. Réessaie depuis Telegram.</p>';
  }
}

load();
</script>
</body>
</html>
