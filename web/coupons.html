<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Editbot — Mes coupons</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, sans-serif; background:#0f1117; color:#e2e8f0; padding:24px; }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p.sub { color:#94a3b8; margin-top:0; margin-bottom: 24px; }
  .card { background:#1a1f2e; border:1px solid #2d3748; border-radius:14px; padding:20px; margin-bottom:20px; }
  .card h2 { font-size:16px; margin-top:0; }
  select, input[type=text], input[type=number] { width:100%; padding:10px; border-radius:8px; border:1px solid #2d3748; background:#0f1117; color:#e2e8f0; margin-bottom:10px; font-size:14px; }
  button { width:100%; padding:12px; border:none; border-radius:8px; background:#3b82f6; color:#fff; font-weight:600; font-size:14px; cursor:pointer; }
  button:hover { background:#2563eb; }
  .coupon { border:1px solid #2d3748; border-radius:10px; padding:12px; margin-bottom:10px; font-size:13px; display:flex; justify-content:space-between; align-items:center; }
  .coupon .del { color:#f87171; cursor:pointer; font-size:12px; background:none; width:auto; padding:4px 8px; }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#22c55e; color:#04240f; padding:10px 18px; border-radius:8px; font-size:14px; display:none; }
  .error { color:#f87171; text-align:center; margin-top:60px; }
</style>
</head>
<body>
<div class="wrap" id="app">Chargement...</div>
<div class="toast" id="toast"></div>
<script>
const tg = window.Telegram?.WebApp;
tg?.ready();
tg?.expand();

const params = new URLSearchParams(location.search);
const token = params.get('token');
const API_BASE = window.EDITBOT_API_BASE || 'https://jxrwgcsbomqvvchvkkdt.supabase.co/functions/v1/web-portal';

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2200);
}

async function api(method, body) {
  const res = await fetch(`${API_BASE}?token=${encodeURIComponent(token)}`, {
    method, headers: { 'Content-Type': 'application/json' }, body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error('Erreur API');
  return res.json();
}

function render(data) {
  const app = document.getElementById('app');
  app.innerHTML = `
    <h1>🎟️ Mes coupons</h1>
    <p class="sub">Ajoute et gère tes codes coupons 1xbet / 1win.</p>
    <div class="card">
      <h2>Ajouter un coupon</h2>
      <select id="bookmaker"><option value="1xbet">1xbet</option><option value="1win">1win</option></select>
      <input type="text" id="code" placeholder="Code du coupon" />
      <input type="text" id="description" placeholder="Description (optionnel)" />
      <input type="number" id="price" placeholder="Prix (optionnel)" />
      <button id="addCoupon">Ajouter le coupon</button>
    </div>
    <div class="card">
      <h2>Mes coupons</h2>
      <div id="coupons"></div>
    </div>
  `;

  document.getElementById('addCoupon').onclick = async () => {
    const bookmaker = document.getElementById('bookmaker').value;
    const code = document.getElementById('code').value.trim();
    const description = document.getElementById('description').value.trim();
    const price = document.getElementById('price').value;
    if (!code) return toast('Entre un code de coupon');
    await api('POST', { coupon: { bookmaker, code, description: description || undefined, price: price ? Number(price) : undefined } });
    toast('Coupon ajouté ✅');
    tg?.HapticFeedback?.notificationOccurred?.('success');
    load();
  };

  const couponsDiv = document.getElementById('coupons');
  couponsDiv.innerHTML = data.coupons.length ? '' : '<p style="color:#64748b;font-size:13px;">Aucun coupon pour le moment.</p>';
  data.coupons.forEach((c) => {
    couponsDiv.insertAdjacentHTML('beforeend', `
      <div class="coupon">
        <div><strong>${c.bookmaker}</strong> — ${c.code}${c.price ? ' · ' + c.price + '€' : ''}<br/>
        <span style="color:#94a3b8">${c.description || ''}</span></div>
        <button class="del" data-id="${c.id}">Supprimer</button>
      </div>`);
  });
  couponsDiv.querySelectorAll('.del').forEach((btn) => {
    btn.onclick = async () => { await api('POST', { deleteCouponId: Number(btn.dataset.id) }); load(); };
  });
}

async function load() {
  if (!token) {
    document.getElementById('app').innerHTML = '<p class="error">Lien invalide. Reviens sur Telegram et réessaie.</p>';
    return;
  }
  try {
    const data = await api('GET');
    render(data);
  } catch (e) {
    document.getElementById('app').innerHTML = '<p class="error">Impossible de charger tes coupons. Réessaie depuis Telegram.</p>';
  }
}

load();
</script>
</body>
</html>
