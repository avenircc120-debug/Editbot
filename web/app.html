<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Editbot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0e1116; color: #f2f4f8; min-height: 100vh;
    padding-bottom: 84px;
  }
  header { padding: 20px 18px 8px; }
  header h1 { margin: 0 0 4px; font-size: 20px; }
  header p { margin: 0; color: #8a93a3; font-size: 13px; }
  main { padding: 12px 16px 24px; }
  .card {
    background: #171b23; border: 1px solid #232936; border-radius: 14px;
    padding: 16px; margin-bottom: 14px;
  }
  .card h2 { margin: 0 0 10px; font-size: 15px; color: #cfd6e4; }
  label { display: block; font-size: 12px; color: #8a93a3; margin: 10px 0 4px; }
  input, select, textarea {
    width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #2a3140;
    background: #0e1116; color: #f2f4f8; font-size: 14px;
  }
  button.primary {
    margin-top: 14px; width: 100%; padding: 12px; border-radius: 10px; border: none;
    background: #3d8bfd; color: white; font-weight: 600; font-size: 14px;
  }
  button.ghost {
    margin-top: 8px; width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #2a3140;
    background: transparent; color: #cfd6e4; font-size: 13px;
  }
  .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 8px 12px; border-radius: 999px; border: 1px solid #2a3140; font-size: 13px;
    cursor: pointer; background: #0e1116; color: #cfd6e4;
  }
  .chip.active { background: #3d8bfd; border-color: #3d8bfd; color: white; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #232936; }
  .row:last-child { border-bottom: none; }
  .row .meta { font-size: 12px; color: #8a93a3; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 999px; }
  .badge.en_attente { background: #4a3b13; color: #f5c451; }
  .badge.validee { background: #123a24; color: #4ade80; }
  .badge.refusee { background: #3a1414; color: #f87171; }
  .balance { font-size: 34px; font-weight: 700; margin: 4px 0 0; }
  nav.tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex;
    background: #10141b; border-top: 1px solid #232936; padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
  }
  nav.tabbar button {
    flex: 1; background: none; border: none; color: #8a93a3; font-size: 11px;
    display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 0;
  }
  nav.tabbar button .icon { font-size: 20px; }
  nav.tabbar button.active { color: #3d8bfd; }
  .empty { color: #6b7385; font-size: 13px; padding: 12px 0; text-align: center; }
  .toast {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    background: #1f2937; color: #f2f4f8; padding: 10px 16px; border-radius: 10px;
    font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 50;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1 id="pageTitle">Editbot</h1>
  <p id="pageSubtitle">Chargement…</p>
</header>
<main id="content"></main>

<nav class="tabbar">
  <button data-tab="competitions"><span class="icon">🏆</span>Compétitions</button>
  <button data-tab="coupons"><span class="icon">🎟️</span>Coupons</button>
  <button data-tab="wallet"><span class="icon">💰</span>Wallet</button>
</nav>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
tg?.ready();
tg?.expand();

const params = new URLSearchParams(location.search);
const token = params.get('token') || '';
let tab = params.get('tab') || 'competitions';

const API_BASE = location.origin.includes('vercel.app')
  ? 'https://jxrwgcsbomqvvchvkkdt.supabase.co/functions/v1'
  : 'https://jxrwgcsbomqvvchvkkdt.supabase.co/functions/v1';

const content = document.getElementById('content');
const pageTitle = document.getElementById('pageTitle');
const pageSubtitle = document.getElementById('pageSubtitle');
const toastEl = document.getElementById('toast');

function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  tg?.HapticFeedback?.notificationOccurred?.('success');
  setTimeout(() => toastEl.classList.remove('show'), 2200);
}

function setActiveTab() {
  document.querySelectorAll('nav.tabbar button').forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
}

document.querySelectorAll('nav.tabbar button').forEach((btn) => {
  btn.addEventListener('click', () => {
    tab = btn.dataset.tab;
    tg?.HapticFeedback?.impactOccurred?.('light');
    render();
  });
});

async function apiGet(path) {
  const res = await fetch(`${API_BASE}/${path}?token=${encodeURIComponent(token)}`);
  return res.json();
}
async function apiPost(path, body) {
  const res = await fetch(`${API_BASE}/${path}?token=${encodeURIComponent(token)}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
  });
  return res.json();
}

async function renderCompetitions() {
  pageTitle.textContent = 'Mes compétitions';
  pageSubtitle.textContent = 'Choisis les championnats que tu veux suivre';
  content.innerHTML = '<div class="card"><div class="empty">Chargement…</div></div>';
  const data = await apiGet('web-portal');
  if (data.error) { content.innerHTML = `<div class="card"><div class="empty">${data.error}</div></div>`; return; }

  const selected = new Set(data.selectedCompetitions || []);
  content.innerHTML = `
    <div class="card">
      <h2>Championnats suivis</h2>
      <div class="chip-grid" id="chips"></div>
      <button class="primary" id="saveComp">Enregistrer</button>
    </div>`;
  const chips = document.getElementById('chips');
  (data.leagues || []).forEach((l) => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (selected.has(l) ? ' active' : '');
    chip.textContent = l;
    chip.addEventListener('click', () => { chip.classList.toggle('active'); tg?.HapticFeedback?.selectionChanged?.(); });
    chips.appendChild(chip);
  });
  document.getElementById('saveComp').addEventListener('click', async () => {
    const competitions = Array.from(chips.querySelectorAll('.chip.active')).map((c) => c.textContent);
    await apiPost('web-portal', { competitions });
    toast('Compétitions enregistrées ✅');
  });
}

async function renderCoupons() {
  pageTitle.textContent = 'Mes coupons';
  pageSubtitle.textContent = 'Ajoute et gère tes codes 1xbet / 1win';
  content.innerHTML = '<div class="card"><div class="empty">Chargement…</div></div>';
  const data = await apiGet('web-portal');
  if (data.error) { content.innerHTML = `<div class="card"><div class="empty">${data.error}</div></div>`; return; }

  content.innerHTML = `
    <div class="card">
      <h2>Ajouter un coupon</h2>
      <label>Bookmaker</label>
      <select id="bookmaker"><option value="1xbet">1xbet</option><option value="1win">1win</option></select>
      <label>Code coupon</label>
      <input id="code" placeholder="Ex: AB12CD34" />
      <label>Description (optionnel)</label>
      <input id="description" placeholder="Ex: Combiné 3 matchs" />
      <label>Prix de vente (optionnel)</label>
      <input id="price" type="number" min="0" step="0.01" placeholder="Ex: 5" />
      <button class="primary" id="addCoupon">Ajouter</button>
    </div>
    <div class="card">
      <h2>Mes coupons</h2>
      <div id="couponList"></div>
    </div>`;

  const list = document.getElementById('couponList');
  if (!data.coupons?.length) {
    list.innerHTML = '<div class="empty">Aucun coupon pour le moment.</div>';
  } else {
    list.innerHTML = data.coupons.map((c) => `
      <div class="row">
        <div>
          <div><strong>${c.bookmaker}</strong> — ${c.code}</div>
          <div class="meta">${c.description || ''} ${c.price ? '· ' + c.price : ''}</div>
        </div>
        <button class="ghost" style="width:auto;padding:6px 10px" data-id="${c.id}">Suppr.</button>
      </div>`).join('');
    list.querySelectorAll('button[data-id]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        await apiPost('web-portal', { deleteCouponId: btn.dataset.id });
        toast('Coupon supprimé');
        renderCoupons();
      });
    });
  }

  document.getElementById('addCoupon').addEventListener('click', async () => {
    const bookmaker = document.getElementById('bookmaker').value;
    const code = document.getElementById('code').value.trim();
    const description = document.getElementById('description').value.trim();
    const price = document.getElementById('price').value;
    if (!code) { toast('Entre un code coupon'); return; }
    await apiPost('web-portal', { coupon: { bookmaker, code, description, price: price ? Number(price) : null } });
    toast('Coupon ajouté ✅');
    renderCoupons();
  });
}

async function renderWallet() {
  pageTitle.textContent = 'Wallet';
  pageSubtitle.textContent = 'Dépôts, retraits et gains de tes coupons vendus';
  content.innerHTML = '<div class="card"><div class="empty">Chargement…</div></div>';
  const data = await apiGet('wallet');
  if (data.error) { content.innerHTML = `<div class="card"><div class="empty">${data.error}</div></div>`; return; }

  content.innerHTML = `
    <div class="card">
      <h2>Solde disponible</h2>
      <div class="balance">${Number(data.balance).toFixed(2)}</div>
    </div>
    <div class="card">
      <h2>Nouvelle opération</h2>
      <label>Type</label>
      <select id="opType"><option value="depot">Dépôt</option><option value="retrait">Retrait</option></select>
      <label>Montant</label>
      <input id="opAmount" type="number" min="0" step="0.01" placeholder="Ex: 20" />
      <label>Méthode (mobile money, etc.)</label>
      <input id="opMethode" placeholder="Ex: Orange Money" />
      <label>Note (optionnel)</label>
      <input id="opNote" placeholder="Ex: Gains coupon vendu" />
      <button class="primary" id="opSubmit">Envoyer la demande</button>
    </div>
    <div class="card">
      <h2>Historique</h2>
      <div id="txList"></div>
    </div>`;

  const txList = document.getElementById('txList');
  if (!data.transactions?.length) {
    txList.innerHTML = '<div class="empty">Aucune opération pour le moment.</div>';
  } else {
    txList.innerHTML = data.transactions.map((t) => `
      <div class="row">
        <div>
          <div><strong>${t.type === 'depot' ? '💰 Dépôt' : t.type === 'retrait' ? '💸 Retrait' : '🎟️ Vente coupon'}</strong> — ${Number(t.amount).toFixed(2)}</div>
          <div class="meta">${new Date(t.created_at).toLocaleString('fr-FR')} ${t.methode ? '· ' + t.methode : ''}</div>
        </div>
        <span class="badge ${t.status}">${t.status === 'en_attente' ? 'En attente' : t.status === 'validee' ? 'Validée' : 'Refusée'}</span>
      </div>`).join('');
  }

  document.getElementById('opSubmit').addEventListener('click', async () => {
    const action = document.getElementById('opType').value;
    const amount = document.getElementById('opAmount').value;
    const methode = document.getElementById('opMethode').value.trim();
    const note = document.getElementById('opNote').value.trim();
    if (!amount || Number(amount) <= 0) { toast('Entre un montant valide'); return; }
    const res = await apiPost('wallet', { action, amount: Number(amount), methode, note });
    if (res.error) { toast(res.error); return; }
    toast('Demande envoyée ✅');
    renderWallet();
  });
}

async function render() {
  setActiveTab();
  if (!token) { content.innerHTML = '<div class="card"><div class="empty">Lien invalide. Reviens depuis Telegram.</div></div>'; return; }
  if (tab === 'coupons') return renderCoupons();
  if (tab === 'wallet') return renderWallet();
  return renderCompetitions();
}

render();
</script>
</body>
</html>
