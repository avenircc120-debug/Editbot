<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Editbot — Mon espace</title>
<style>
:root{--bg:#0f1117;--surface:#1a1f2e;--border:#2d3748;--text:#e2e8f0;--muted:#94a3b8;--blue:#3b82f6;--green:#22c55e;--red:#f87171;--live:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
.header h1{font-size:17px;font-weight:700;}
.header .status{margin-left:auto;font-size:12px;color:var(--muted);}
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:9;}
.nav-btn{flex:1;padding:12px 2px;background:none;border:none;color:var(--muted);font-size:11px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-bottom:2px solid transparent;transition:all .2s;}
.nav-btn .icon{font-size:18px;}
.nav-btn.active{color:var(--blue);border-bottom-color:var(--blue);}
.content{flex:1;padding:16px 14px 90px;max-width:560px;width:100%;margin:0 auto;}
.tab{display:none;}.tab.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}
.card-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.balance{text-align:center;padding:8px 0 4px;}
.balance .amount{font-size:40px;font-weight:800;}
.balance .currency{font-size:17px;color:var(--muted);margin-left:3px;}
.tx{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.tx:last-child{border-bottom:none;}
.tx-label{font-weight:600;font-size:13px;}
.tx-meta{color:var(--muted);font-size:11px;margin-top:2px;}
.tx-amount{font-weight:700;font-size:14px;}
.tx-amount.depot{color:var(--green);}.tx-amount.retrait{color:var(--red);}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;}
.badge.en_attente{background:#78350f22;color:#fbbf24;border:1px solid #78350f55;}
.badge.validee{background:#14532d22;color:var(--green);border:1px solid #14532d55;}
.badge.refusee{background:#450a0a22;color:var(--red);border:1px solid #450a0a55;}
.form-row{margin-bottom:11px;}
label.form-label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500;}
input,select{width:100%;padding:10px 13px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none;}
input:focus,select:focus{border-color:var(--blue);}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-success{background:var(--green);color:#04240f;}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red);padding:7px 13px;width:auto;border-radius:8px;font-size:12px;cursor:pointer;}
.btn-outline{background:transparent;color:var(--blue);border:2px solid var(--blue);}
.fb-page{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);}
.fb-page:last-child{border-bottom:none;}
.page-name{font-weight:600;font-size:14px;}
.page-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;}
.coupon-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);}
.coupon-item:last-child{border-bottom:none;}
.bookmaker{font-weight:700;font-size:14px;}
.code-tag{font-family:monospace;font-size:12px;color:var(--blue);background:#1e3a5f33;padding:2px 5px;border-radius:4px;}
.desc{font-size:12px;color:var(--muted);margin-top:2px;}
.price-tag{background:#14532d33;color:var(--green);border:1px solid #14532d66;border-radius:6px;padding:3px 7px;font-size:12px;font-weight:700;white-space:nowrap;margin-right:6px;}
.league-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.league-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 12px;cursor:pointer;transition:border-color .2s;display:flex;align-items:center;gap:10px;}
.league-card:hover{border-color:var(--blue);}
.league-flag{font-size:22px;}
.league-name{font-size:13px;font-weight:600;line-height:1.3;}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--blue);font-size:14px;font-weight:600;cursor:pointer;padding:0 0 14px;}
.filter-pills{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.pill{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;}
.pill.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:9px;display:flex;align-items:center;gap:10px;}
.match-card.live-match{border-color:#ef444455;background:#ef444408;}
.teams{flex:1;min-width:0;}
.matchup{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.match-meta{font-size:11px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:6px;}
.score-box{text-align:center;min-width:48px;}
.score{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;}
.score.live{color:var(--live);}
.badge-live{display:inline-flex;align-items:center;gap:4px;background:#ef444422;color:var(--live);border:1px solid #ef444455;border-radius:20px;padding:2px 7px;font-size:10px;font-weight:700;}
.badge-live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--live);animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.badge-sched{display:inline-block;background:#1e293b;color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:2px 7px;font-size:10px;}
.badge-fin{display:inline-block;background:#14532d22;color:#4ade80;border:1px solid #14532d55;border-radius:20px;padding:2px 7px;font-size:10px;font-weight:600;}
.toggle-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
.toggle-lbl{font-size:9px;color:var(--muted);text-align:center;line-height:1.2;white-space:nowrap;}
.toggle{position:relative;width:42px;height:23px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;border-radius:23px;background:#2d3748;transition:background .2s;}
.slider:before{content:'';position:absolute;width:17px;height:17px;left:3px;top:3px;border-radius:50%;background:#fff;transition:transform .2s;}
.toggle input:checked+.slider{background:var(--live);}
.toggle input:checked+.slider:before{transform:translateX(19px);}
.toggle input:disabled+.slider{opacity:.4;cursor:not-allowed;}
.empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:14px;}
.empty .emoji{font-size:34px;margin-bottom:10px;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1e293b;color:var(--text);border:1px solid var(--border);padding:11px 18px;border-radius:10px;font-size:14px;display:none;z-index:100;white-space:nowrap;box-shadow:0 4px 20px #00000066;}
.toast.show{display:block;animation:fi .2s;}
.toast.error{border-color:var(--red);color:var(--red);}
@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.loader{text-align:center;padding:48px 16px;color:var(--muted);font-size:14px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
  <span style="font-size:22px">⚽</span>
  <h1>Mon espace Editbot</h1>
  <span class="status" id="statusDot"></span>
</div>
<div class="nav">
  <button class="nav-btn active" onclick="showTab('wallet',this)"><span class="icon">💰</span>Wallet</button>
  <button class="nav-btn" onclick="showTab('facebook',this)"><span class="icon">📘</span>Facebook</button>
  <button class="nav-btn" onclick="showTab('coupons',this)"><span class="icon">🎫</span>Coupons</button>
  <button class="nav-btn" onclick="showTab('competitions',this)"><span class="icon">⚽</span>Compétitions</button>
</div>
<div class="content">
  <div class="tab active" id="tab-wallet"><div class="loader"><div class="spinner"></div>Chargement...</div></div>
  <div class="tab" id="tab-facebook"><div class="loader"><div class="spinner"></div>Chargement...</div></div>
  <div class="tab" id="tab-coupons"><div class="loader"><div class="spinner"></div>Chargement...</div></div>
  <div class="tab" id="tab-competitions"><div class="loader"><div class="spinner"></div>Chargement...</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const params=new URLSearchParams(location.search),token=params.get('token');
const API='https://jxrwgcsbomqvvchvkkdt.supabase.co/functions/v1/web-portal';
let DATA=null,currentLeague=null,currentFilter='all';

const LEAGUES=[
  {id:'4334',name:'Ligue 1',flag:'\u{1F1EB}\u{1F1F7}'},{id:'4328',name:'Premier League',flag:'\u{1F3F4}\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0067}\u{E007F}'},
  {id:'4335',name:'La Liga',flag:'\u{1F1EA}\u{1F1F8}'},{id:'4331',name:'Bundesliga',flag:'\u{1F1E9}\u{1F1EA}'},
  {id:'4332',name:'Serie A',flag:'\u{1F1EE}\u{1F1F9}'},{id:'4480',name:'Champions League',flag:'\u{1F3C6}'},
  {id:'4481',name:'Europa League',flag:'\u{1F7E0}'},{id:'4329',name:'Championship',flag:'\u{1F3F4}\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0067}\u{E007F}'},
  {id:'4337',name:'Eredivisie',flag:'\u{1F1F3}\u{1F1F1}'},{id:'4344',name:'Primeira Liga',flag:'\u{1F1F5}\u{1F1F9}'},
  {id:'4346',name:'MLS',flag:'\u{1F1FA}\u{1F1F8}'},{id:'4351',name:'Brasileirao',flag:'\u{1F1E7}\u{1F1F7}'},
  {id:'4350',name:'Liga MX',flag:'\u{1F1F2}\u{1F1FD}'},{id:'4406',name:'Liga Argentina',flag:'\u{1F1E6}\u{1F1F7}'},
  {id:'4359',name:'Chinese Super League',flag:'\u{1F1E8}\u{1F1F3}'},{id:'4429',name:'Coupe du Monde',flag:'\u{1F30D}'},
  {id:'4330',name:'Scottish Premiership',flag:'\u{1F3F4}\u{E0067}\u{E0062}\u{E0073}\u{E0063}\u{E0074}\u{E007F}'}
];

function showTab(n,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+n).classList.add('active');
  btn.classList.add('active');
}
function toast(msg,err){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show'+(err?' error':'');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2800);
}
async function api(method,body,extra){
  let url=API+'?token='+encodeURIComponent(token);
  if(extra) url+='&'+new URLSearchParams(extra).toString();
  const res=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
  const d=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(d.error||'Erreur API');
  return d;
}

// WALLET
function renderWallet(w){
  const tx=(w&&w.transactions)||[],bal=Number((w&&w.balance)||0).toFixed(2);
  const txH=tx.length?tx.map(t=>{
    const dt=new Date(t.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
    const sg=t.type==='depot'?'+':'-',cl=t.type==='depot'?'depot':'retrait';
    return '<div class="tx"><div><div class="tx-label">'+(t.type==='depot'?'D\u00e9p\u00f4t':'Retrait')+(t.methode?' \u00b7 '+t.methode:'')+'</div><div class="tx-meta">'+dt+' <span class="badge '+t.status+'">'+t.status+'</span></div></div><div class="tx-amount '+cl+'">'+sg+Number(t.amount).toFixed(2)+' \u20ac</div></div>';
  }).join(''):'<div class="empty"><div class="emoji">\u{1F4ED}</div>Aucune transaction</div>';
  document.getElementById('tab-wallet').innerHTML=
    '<div class="card"><div class="card-title">Solde</div><div class="balance"><span class="amount">'+bal+'</span><span class="currency">\u20ac</span></div></div>'+
    '<div class="card"><div class="card-title">D\u00e9p\u00f4t / Retrait</div>'+
    '<div class="form-row"><label class="form-label">Type</label><select id="wT"><option value="depot">\u{1F4B5} D\u00e9p\u00f4t</option><option value="retrait">\u{1F4B8} Retrait</option></select></div>'+
    '<div class="form-row"><label class="form-label">Montant (\u20ac)</label><input type="number" id="wA" placeholder="Ex : 20" min="1"/></div>'+
    '<div class="form-row"><label class="form-label">M\u00e9thode</label><input type="text" id="wM" placeholder="PayPal, Virement, Mobile Money..."/></div>'+
    '<div class="form-row"><label class="form-label">Note (optionnel)</label><input type="text" id="wN" placeholder="Informations compl\u00e9mentaires"/></div>'+
    '<button class="btn btn-primary" id="wS">Envoyer la demande</button></div>'+
    '<div class="card"><div class="card-title">Historique</div>'+txH+'</div>';
  document.getElementById('wS').onclick=async()=>{
    const type=document.getElementById('wT').value,amount=parseFloat(document.getElementById('wA').value);
    const methode=document.getElementById('wM').value.trim(),note=document.getElementById('wN').value.trim();
    if(!amount||amount<=0) return toast('Entre un montant valide',true);
    try{await api('POST',{wallet:{type,amount,methode:methode||null,note:note||null}});
    toast('Demande envoy\u00e9e \u2705');const f=await api('GET');DATA=f;renderWallet(f.wallet);}
    catch(e){toast(e.message,true);}
  };
}

// FACEBOOK
function renderFacebook(d){
  const pages=(d&&d.fbPages)||[];
  const ph=pages.length?pages.map(p=>'<div class="fb-page"><div><div class="page-name"><span class="dot"></span>'+p.fb_page_name+'</div><div class="page-meta">Connect\u00e9e le '+new Date(p.connected_at).toLocaleDateString('fr-FR')+'</div></div><button class="btn-danger" onclick="disconnectFb('+p.id+')">D\u00e9connecter</button></div>').join(''):'<div class="empty"><div class="emoji">\u{1F4ED}</div>Aucune page connect\u00e9e</div>';
  document.getElementById('tab-facebook').innerHTML=
    '<div class="card"><div class="card-title">Pages connect\u00e9es</div>'+ph+'</div>'+
    '<div class="card"><div class="card-title">Connecter une page</div>'+
    '<p style="font-size:13px;color:var(--muted);margin-bottom:12px;">Autorisez Editbot \u00e0 publier les scores sur votre Page Facebook.</p>'+
    '<button class="btn btn-outline" id="btnFb">\u{1F4D8} Connecter une Page Facebook</button></div>';
  document.getElementById('btnFb').onclick=async()=>{
    try{const r=await api('GET',undefined,{action:'fb_connect_url'});if(r.url)window.location.href=r.url;}
    catch(e){toast(e.message,true);}
  };
}
window.disconnectFb=async(id)=>{
  if(!confirm('D\u00e9connecter cette page ?')) return;
  try{await api('POST',{disconnectFbPageId:id});toast('Page d\u00e9connect\u00e9e');
  const f=await api('GET');DATA=f;renderFacebook(f);}catch(e){toast(e.message,true);}
};

// COUPONS
function renderCoupons(coupons){
  const lh=coupons.length?coupons.map(c=>'<div class="coupon-item"><div><div class="bookmaker">'+c.bookmaker+' <span class="code-tag">'+c.code+'</span></div>'+(c.description?'<div class="desc">'+c.description+'</div>':'')+'</div><div style="display:flex;align-items:center;gap:6px;flex-shrink:0">'+(c.price?'<span class="price-tag">'+Number(c.price).toFixed(2)+'\u20ac</span>':'')+'<button class="btn-danger" onclick="delCoupon('+c.id+')">\u2715</button></div></div>').join(''):'<div class="empty"><div class="emoji">\u{1F3AB}</div>Aucun coupon</div>';
  document.getElementById('tab-coupons').innerHTML=
    '<div class="card"><div class="card-title">Ajouter un coupon</div>'+
    '<div class="form-row"><label class="form-label">Bookmaker</label><select id="cB"><option value="1xbet">1xbet</option><option value="1win">1win</option><option value="Melbet">Melbet</option><option value="Betway">Betway</option><option value="Autre">Autre</option></select></div>'+
    '<div class="form-row"><label class="form-label">Code *</label><input type="text" id="cC" placeholder="Ex : ABC123XY"/></div>'+
    '<div class="form-row"><label class="form-label">Description</label><input type="text" id="cD" placeholder="Ex : Combo 5 matchs, cote 8.5"/></div>'+
    '<div class="form-row"><label class="form-label">Prix (\u20ac)</label><input type="number" id="cP" placeholder="Ex : 5" min="0" step="0.5"/></div>'+
    '<button class="btn btn-success" id="btnAC">\u2795 Ajouter le coupon</button></div>'+
    '<div class="card"><div class="card-title">Mes coupons ('+coupons.length+')</div>'+lh+'</div>';
  document.getElementById('btnAC').onclick=async()=>{
    const bk=document.getElementById('cB').value,cd=document.getElementById('cC').value.trim();
    const ds=document.getElementById('cD').value.trim(),pr=document.getElementById('cP').value;
    if(!cd) return toast('Le code est obligatoire',true);
    try{await api('POST',{coupon:{bookmaker:bk,code:cd,description:ds||null,price:pr?Number(pr):null}});
    toast('Coupon ajout\u00e9 \u2705');const f=await api('GET');DATA=f;renderCoupons(f.coupons||[]);}
    catch(e){toast(e.message,true);}
  };
}
window.delCoupon=async(id)=>{
  try{await api('POST',{deleteCouponId:id});toast('Coupon supprim\u00e9');
  const f=await api('GET');DATA=f;renderCoupons(f.coupons||[]);}catch(e){toast(e.message,true);}
};

// COMPETITIONS
function renderLeagueGrid(){
  currentLeague=null;
  document.getElementById('tab-competitions').innerHTML=
    '<div style="font-size:13px;color:var(--muted);margin-bottom:14px;">S\u00e9lectionne une comp\u00e9tition pour voir les matchs et activer la diffusion.</div>'+
    '<div class="league-grid">'+
    LEAGUES.map(l=>'<div class="league-card" onclick="loadMatches(''+l.id+'',''+l.name.replace(/'/g,"\'")+'\',''+l.flag+'')"><span class="league-flag">'+l.flag+'</span><span class="league-name">'+l.name+'</span></div>').join('')+
    '</div>';
}
window.loadMatches=async(id,name,flag)=>{
  currentLeague={id,name,flag};currentFilter='all';
  showMatchShell(name,flag,'all');
  await fetchMatches();
};
function showMatchShell(name,flag,filter){
  document.getElementById('tab-competitions').innerHTML=
    '<button class="back-btn" onclick="renderLeagueGrid()">\u2190 Retour</button>'+
    '<div style="font-size:15px;font-weight:700;margin-bottom:12px;">'+flag+' '+name+'</div>'+
    '<div class="filter-pills">'+
    '<button class="pill'+(filter==='live'?' active':'')+'" onclick="setFilter('live',this)">\u{1F534} En direct</button>'+
    '<button class="pill'+(filter==='today'?' active':'')+'" onclick="setFilter('today',this)">\u{1F4C5} Aujourd\u2019hui</button>'+
    '<button class="pill'+(filter==='all'?' active':'')+'" onclick="setFilter('all',this)">\u{1F4CB} Tous</button>'+
    '</div><div id="ml"><div class="loader"><div class="spinner"></div>Chargement...</div></div>';
}
window.setFilter=async(f,btn)=>{
  currentFilter=f;
  document.querySelectorAll('.filter-pills .pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('ml').innerHTML='<div class="loader"><div class="spinner"></div>Chargement...</div>';
  await fetchMatches();
};
async function fetchMatches(){
  try{
    const d=await api('GET',undefined,{action:'matches',competitionId:currentLeague.id,filter:currentFilter});
    const matches=d.matches||[],sel=new Set(d.broadcastIds||[]);
    const ml=document.getElementById('ml');if(!ml)return;
    if(!matches.length){ml.innerHTML='<div class="empty"><div class="emoji">\u{1F4ED}</div>Aucun match pour ce filtre</div>';return;}
    ml.innerHTML=matches.map(m=>{
      const live=m.status==='inprogress',fin=m.status==='finished',br=sel.has(m.match_id);
      const sc=(m.home_score!=null&&m.away_score!=null)?m.home_score+' - '+m.away_score:'';
      const dt=m.match_date?new Date(m.match_date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'';
      const sbadge=live?'<span class="badge-live">EN DIRECT</span>':fin?'<span class="badge-fin">Termin\u00e9</span>':'<span class="badge-sched">'+dt+'</span>';
      const dis=(!live&&!br)?'disabled':'';
      const htE=encodeURIComponent(m.home_team),atE=encodeURIComponent(m.away_team);
      const comp=encodeURIComponent(m.competition||'');
      return '<div class="match-card'+(live?' live-match':'')+'">'+
        '<div class="teams"><div class="matchup">'+m.home_team+' vs '+m.away_team+'</div>'+
        '<div class="match-meta">'+sbadge+'</div></div>'+
        (sc?'<div class="score-box"><div class="score'+(live?' live':'')+'">'+sc+'</div></div>':'')+
        '<div class="toggle-wrap">'+
          '<label class="toggle"><input type="checkbox"'+(br?' checked':'')+' '+dis+' onchange="toggleBroadcast(this,''+m.match_id+'',''+comp+'',''+htE+'',''+atE+'')"/><span class="slider"></span></label>'+
          '<div class="toggle-lbl" id="tl-'+m.match_id+'">'+(br?'\u{1F534} Diffus\u00e9':'Diffuser')+'</div>'+
        '</div></div>';
    }).join('');
  }catch(e){const ml=document.getElementById('ml');if(ml)ml.innerHTML='<div class="empty"><div class="emoji">\u274C</div>'+e.message+'</div>';}
}
window.toggleBroadcast=async(el,matchId,compE,htE,atE)=>{
  const active=el.checked;
  const competition=decodeURIComponent(compE),homeTeam=decodeURIComponent(htE),awayTeam=decodeURIComponent(atE);
  const lbl=document.getElementById('tl-'+matchId);
  try{
    await api('POST',{broadcast:{matchId,active,competition,homeTeam,awayTeam}});
    if(lbl) lbl.textContent=active?'\u{1F534} Diffus\u00e9':'Diffuser';
    toast(active?'Diffusion activ\u00e9e \u2705':'Diffusion d\u00e9sactiv\u00e9e');
  }catch(e){el.checked=!active;toast(e.message,true);}
};

// INIT
async function init(){
  if(!token){
    document.querySelector('.content').innerHTML='<div class="empty" style="margin-top:60px"><div class="emoji">\u26A0\uFE0F</div>Lien invalide.<br/>Ouvre depuis Telegram.</div>';
    return;
  }
  try{
    DATA=await api('GET');
    renderWallet(DATA.wallet||{});
    renderFacebook(DATA);
    renderCoupons(DATA.coupons||[]);
    renderLeagueGrid();
    document.getElementById('statusDot').textContent='\u25CF En ligne';
    document.getElementById('statusDot').style.color='#22c55e';
  }catch(e){
    document.querySelector('.content').innerHTML='<div class="empty" style="margin-top:60px"><div class="emoji">\u274C</div>'+e.message+'</div>';
  }
}
init();
</script>
