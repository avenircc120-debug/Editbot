<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Editbot — Mon espace</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1f2e; --border: #2d3748;
    --text: #e2e8f0; --muted: #94a3b8; --blue: #3b82f6;
    --green: #22c55e; --red: #f87171; --orange: #f97316;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui,-apple-system,sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header .status { margin-left: auto; font-size: 12px; color: var(--muted); }
  .nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 57px; z-index: 9; }
  .nav-btn { flex: 1; padding: 14px 4px; background: none; border: none; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; border-bottom: 2px solid transparent; transition: all .2s; }
  .nav-btn .icon { font-size: 20px; }
  .nav-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
  .content { flex: 1; padding: 20px 16px 100px; max-width: 560px; width: 100%; margin: 0 auto; }
  .tab { display: none; }
  .tab.active { display: block; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; }
  .balance { text-align: center; padding: 10px 0 6px; }
  .balance .amount { font-size: 42px; font-weight: 800; color: var(--text); }
  .balance .currency { font-size: 18px; color: var(--muted); margin-left: 4px; }
  .tx { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .tx:last-child { border-bottom: none; }
  .tx .tx-info { font-size: 13px; }
  .tx .tx-label { font-weight: 600; }
  .tx .tx-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .tx .tx-amount { font-weight: 700; font-size: 15px; }
  .tx .tx-amount.depot { color: var(--green); }
  .tx .tx-amount.retrait { color: var(--red); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.en_attente { background: #78350f22; color: #fbbf24; border: 1px solid #78350f55; }
  .badge.validee { background: #14532d22; color: var(--green); border: 1px solid #14532d55; }
  .badge.refusee { background: #450a0a22; color: var(--red); border: 1px solid #450a0a55; }
  .form-row { margin-bottom: 12px; }
  label.form-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
  input, select { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
  input:focus, select:focus { border-color: var(--blue); }
  .btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-success { background: var(--green); color: #04240f; }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); padding: 8px 14px; width: auto; border-radius: 8px; font-size: 12px; cursor: pointer; }
  .btn-outline { background: transparent; color: var(--blue); border: 2px solid var(--blue); }
  .fb-page { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .fb-page:last-child { border-bottom: none; }
  .fb-page .page-name { font-weight: 600; font-size: 14px; }
  .fb-page .page-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 5px; }
  .coupon-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .coupon-item:last-child { border-bottom: none; }
  .coupon-info .bookmaker { font-weight: 700; font-size: 14px; }
  .coupon-info .code { font-family: monospace; font-size: 13px; color: var(--blue); background: #1e3a5f33; padding: 2px 6px; border-radius: 4px; }
  .coupon-info .desc { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .price-tag { background: #14532d33; color: var(--green); border: 1px solid #14532d66; border-radius: 6px; padding: 3px 8px; font-size: 12px; font-weight: 700; white-space: nowrap; margin-right: 8px; }
  .empty { text-align: center; padding: 36px 20px; color: var(--muted); font-size: 14px; }
  .empty .emoji { font-size: 36px; margin-bottom: 10px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: var(--text); border: 1px solid var(--border); padding: 12px 20px; border-radius: 10px; font-size: 14px; display: none; z-index: 100; white-space: nowrap; box-shadow: 0 4px 20px #00000066; }
  .toast.show { display: block; animation: fadeIn .2s; }
  .toast.error { border-color: var(--red); color: var(--red); }
  @keyframes fadeIn { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  .loader { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <span style="font-size:24px">⚽</span>
  <h1>Mon espace Editbot</h1>
  <span class="status" id="statusDot"></span>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showTab('wallet',this)">
    <span class="icon">💰</span>Wallet
  </button>
  <button class="nav-btn" onclick="showTab('facebook',this)">
    <span class="icon">📘</span>Facebook
  </button>
  <button class="nav-btn" onclick="showTab('coupons',this)">
    <span class="icon">🎫</span>Coupons
  </button>
</div>

<div class="content">
  <div class="tab active" id="tab-wallet"><div class="loader"><div class="spinner"></div>Chargement...</div></div>
  <div class="tab" id="tab-facebook"><div class="loader"><div class="spinner"></div>Chargement...</div></div>
  <div class="tab" id="tab-coupons"><div class="loader"><div class="spinner"></div>Chargement...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const params   = new URLSearchParams(location.search);
const token    = params.get('token');
const API_BASE = 'https://jxrwgcsbomqvvchvkkdt.supabase.co/functions/v1/web-portal';
let DATA = null;

function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

async function api(method, body, action) {
  const url = API_BASE + '?token=' + encodeURIComponent(token) + (action ? '&action=' + action : '');
  const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: body ? JSON.stringify(body) : undefined });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Erreur API');
  return data;
}

function renderWallet(w) {
  const tx = (w && w.transactions) ? w.transactions : [];
  const balance = Number((w && w.balance) ? w.balance : 0).toFixed(2);
  const txHtml = tx.length ? tx.map(t => {
    const date = new Date(t.created_at).toLocaleDateString('fr-FR', {day:'2-digit',month:'short'});
    const sign = t.type==='depot' ? '+' : '-';
    const cls  = t.type==='depot' ? 'depot' : 'retrait';
    return '<div class="tx"><div class="tx-info"><div class="tx-label">'+(t.type==='depot'?'Dépôt':'Retrait')+(t.methode?' · '+t.methode:'')+'</div><div class="tx-meta">'+date+' <span class="badge '+t.status+'">'+t.status+'</span></div></div><div class="tx-amount '+cls+'">'+sign+Number(t.amount).toFixed(2)+' €</div></div>';
  }).join('') : '<div class="empty"><div class="emoji">📭</div>Aucune transaction</div>';

  document.getElementById('tab-wallet').innerHTML =
    '<div class="card"><div class="card-title">Solde disponible</div><div class="balance"><span class="amount">'+balance+'</span><span class="currency">€</span></div></div>'+
    '<div class="card"><div class="card-title">Dépôt / Retrait</div>'+
    '<div class="form-row"><label class="form-label">Type</label><select id="wType"><option value="depot">💵 Dépôt</option><option value="retrait">💸 Retrait</option></select></div>'+
    '<div class="form-row"><label class="form-label">Montant (€)</label><input type="number" id="wAmount" placeholder="Ex : 20" min="1" /></div>'+
    '<div class="form-row"><label class="form-label">Méthode</label><input type="text" id="wMethode" placeholder="PayPal, Virement, Mobile Money..." /></div>'+
    '<div class="form-row"><label class="form-label">Note (optionnel)</label><input type="text" id="wNote" placeholder="Informations complémentaires" /></div>'+
    '<button class="btn btn-primary" id="wSubmit">Envoyer la demande</button></div>'+
    '<div class="card"><div class="card-title">Historique</div>'+txHtml+'</div>';

  document.getElementById('wSubmit').onclick = async () => {
    const type=document.getElementById('wType').value, amount=parseFloat(document.getElementById('wAmount').value);
    const methode=document.getElementById('wMethode').value.trim(), note=document.getElementById('wNote').value.trim();
    if (!amount||amount<=0) return toast('Entre un montant valide',true);
    try {
      await api('POST',{wallet:{type,amount,methode:methode||null,note:note||null}});
      toast('Demande envoyée ✅ En attente de validation');
      const fresh=await api('GET'); DATA=fresh; renderWallet(fresh.wallet);
    } catch(e){toast(e.message,true);}
  };
}

function renderFacebook(d) {
  const pages = (d && d.fbPages) ? d.fbPages : [];
  const pagesHtml = pages.length ? pages.map(p =>
    '<div class="fb-page"><div><div class="page-name"><span class="dot"></span>'+p.fb_page_name+'</div>'+
    '<div class="page-meta">Connectée le '+new Date(p.connected_at).toLocaleDateString('fr-FR')+'</div></div>'+
    '<button class="btn-danger" onclick="disconnectFb('+p.id+')">Déconnecter</button></div>'
  ).join('') : '<div class="empty"><div class="emoji">📭</div>Aucune page connectée</div>';

  document.getElementById('tab-facebook').innerHTML =
    '<div class="card"><div class="card-title">Pages connectées</div>'+pagesHtml+'</div>'+
    '<div class="card"><div class="card-title">Connecter une page</div>'+
    '<p style="font-size:13px;color:var(--muted);margin-bottom:14px;">Autorisez Editbot à publier les scores en direct sur votre Page Facebook.</p>'+
    '<button class="btn btn-outline" id="btnFbConnect">📘 Connecter une Page Facebook</button></div>';

  document.getElementById('btnFbConnect').onclick = async () => {
    try { const r=await api('GET',undefined,'fb_connect_url'); if(r.url) window.location.href=r.url; }
    catch(e){toast(e.message,true);}
  };
}

window.disconnectFb = async (id) => {
  if(!confirm('Déconnecter cette page ?')) return;
  try {
    await api('POST',{disconnectFbPageId:id}); toast('Page déconnectée');
    const fresh=await api('GET'); DATA=fresh; renderFacebook(fresh);
  } catch(e){toast(e.message,true);}
};

function renderCoupons(coupons) {
  const listHtml = coupons.length ? coupons.map(c =>
    '<div class="coupon-item"><div class="coupon-info">'+
    '<div class="bookmaker">'+c.bookmaker+' &nbsp;<span class="code">'+c.code+'</span></div>'+
    (c.description?'<div class="desc">'+c.description+'</div>':'')+
    '</div><div style="display:flex;align-items:center;gap:6px;flex-shrink:0">'+
    (c.price?'<span class="price-tag">'+Number(c.price).toFixed(2)+'€</span>':'')+
    '<button class="btn-danger" onclick="deleteCoupon('+c.id+')">✕</button></div></div>'
  ).join('') : '<div class="empty"><div class="emoji">🎫</div>Aucun coupon pour le moment</div>';

  document.getElementById('tab-coupons').innerHTML =
    '<div class="card"><div class="card-title">Ajouter un coupon</div>'+
    '<div class="form-row"><label class="form-label">Bookmaker</label>'+
    '<select id="cpBook"><option value="1xbet">1xbet</option><option value="1win">1win</option><option value="Melbet">Melbet</option><option value="Betway">Betway</option><option value="Autre">Autre</option></select></div>'+
    '<div class="form-row"><label class="form-label">Code du coupon *</label><input type="text" id="cpCode" placeholder="Ex : ABC123XY" /></div>'+
    '<div class="form-row"><label class="form-label">Description</label><input type="text" id="cpDesc" placeholder="Ex : Combo 5 matchs, cote 8.5" /></div>'+
    '<div class="form-row"><label class="form-label">Prix de vente (€)</label><input type="number" id="cpPrice" placeholder="Ex : 5" min="0" step="0.5" /></div>'+
    '<button class="btn btn-success" id="btnAddCoupon">➕ Ajouter le coupon</button></div>'+
    '<div class="card"><div class="card-title">Mes coupons actifs ('+coupons.length+')</div>'+listHtml+'</div>';

  document.getElementById('btnAddCoupon').onclick = async () => {
    const bookmaker=document.getElementById('cpBook').value, code=document.getElementById('cpCode').value.trim();
    const desc=document.getElementById('cpDesc').value.trim(), price=document.getElementById('cpPrice').value;
    if(!code) return toast('Le code est obligatoire',true);
    try {
      await api('POST',{coupon:{bookmaker,code,description:desc||null,price:price?Number(price):null}});
      toast('Coupon ajouté ✅');
      const fresh=await api('GET'); DATA=fresh; renderCoupons(fresh.coupons||[]);
    } catch(e){toast(e.message,true);}
  };
}

window.deleteCoupon = async (id) => {
  try {
    await api('POST',{deleteCouponId:id}); toast('Coupon supprimé');
    const fresh=await api('GET'); DATA=fresh; renderCoupons(fresh.coupons||[]);
  } catch(e){toast(e.message,true);}
};

async function init() {
  if(!token){
    document.querySelector('.content').innerHTML='<div class="empty" style="margin-top:60px"><div class="emoji">⚠️</div>Lien invalide.<br/>Ouvre cette page depuis Telegram.</div>';
    return;
  }
  try {
    DATA=await api('GET');
    renderWallet(DATA.wallet||{});
    renderFacebook(DATA);
    renderCoupons(DATA.coupons||[]);
    document.getElementById('statusDot').textContent='● En ligne';
    document.getElementById('statusDot').style.color='#22c55e';
  } catch(e){
    document.querySelector('.content').innerHTML='<div class="empty" style="margin-top:60px"><div class="emoji">❌</div>'+e.message+'</div>';
  }
}
init();
</script>
</body>
</html>
