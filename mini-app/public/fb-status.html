<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Facebook</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;
    display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
  .c{background:#1a1f2e;border:1px solid #2d3748;border-radius:16px;
    padding:40px;max-width:420px;width:100%;text-align:center}
  .i{font-size:52px;margin-bottom:16px}
  h2{color:#fff;font-size:22px;margin-bottom:12px}
  p{color:#a0aec0;line-height:1.7;font-size:15px;margin-bottom:0}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    margin-top:28px;padding:14px 28px;
    background:#229ED9;color:#fff;
    border:none;border-radius:12px;
    font-size:16px;font-weight:600;
    cursor:pointer;text-decoration:none;
    transition:opacity .15s;
  }
  .btn:hover{opacity:.85}
  .btn-add{
    display:inline-flex;align-items:center;gap:8px;
    margin-top:14px;padding:13px 24px;
    background:#1877f2;color:#fff;
    border:none;border-radius:12px;
    font-size:15px;font-weight:600;
    cursor:pointer;width:100%;justify-content:center;
    transition:opacity .15s;
  }
  .btn-add:hover{opacity:.85}
  .btn-secondary{
    display:block;margin-top:12px;
    font-size:13px;color:#718096;
    cursor:pointer;background:none;border:none;
    text-decoration:underline;
  }
</style>
</head>
<body>
  <div class="c">
    <div class="i" id="icon"></div>
    <h2 id="titre"></h2>
    <p id="corps"></p>
    <div id="actions"></div>
  </div>
  <script>
    var params  = new URLSearchParams(window.location.search);
    var icon    = params.get('icon')   || 'ℹ️';
    var titre   = params.get('titre')  || 'Facebook';
    var corps   = params.get('corps')  || '';
    var action  = params.get('action') || '';
    var addUrl  = params.get('addUrl') || '';

    document.getElementById('icon').textContent  = icon;
    document.getElementById('titre').textContent = titre;
    document.title = titre;
    document.getElementById('corps').textContent = corps;

    var actionsEl = document.getElementById('actions');

    /* ── Bouton "Ajouter un autre compte Facebook" (page de succès uniquement) ── */
    if (addUrl && icon === '✅') {
      var btnAdd = document.createElement('button');
      btnAdd.className = 'btn-add';
      btnAdd.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg> Ajouter un autre compte Facebook';
      btnAdd.onclick = function() {
        window.location.href = addUrl;
      };
      actionsEl.appendChild(btnAdd);
    }

    /* ── Bouton "Retourner sur Telegram" sur les pages de succès/erreur ── */
    if (action === 'close' || icon === '✅' || icon === '❌') {
      var btn = document.createElement('button');
      btn.className = 'btn';
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 1 0 12 24a12 12 0 0 0-.056-24zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.96 6.504-1.36 8.63-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg> Retourner sur Telegram';
      btn.onclick = function() {
        try { window.close(); } catch(e) {}
        setTimeout(function() { window.location.href = 'tg://'; }, 300);
      };
      actionsEl.appendChild(btn);

      var hint = document.createElement('p');
      hint.className = 'btn-secondary';
      hint.textContent = 'Si le bouton ne fonctionne pas, ferme ce navigateur manuellement.';
      actionsEl.appendChild(hint);
    }
  </script>
</body>
</html>
