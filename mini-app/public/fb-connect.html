<!DOCTYPE html>
    <html lang="fr">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Connexion Facebook…</title>
    <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;
      display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
    .c{background:#1a1f2e;border:1px solid #2d3748;border-radius:16px;
      padding:40px;max-width:420px;width:100%;text-align:center}
    .i{font-size:48px;margin-bottom:16px}
    h2{color:#fff;font-size:20px;margin-bottom:12px}
    p{color:#a0aec0;line-height:1.7;font-size:14px;margin-bottom:0}
    .note{
      background:rgba(24,119,242,0.12);border:1px solid rgba(24,119,242,0.3);
      border-radius:10px;padding:14px 16px;margin:18px 0 0;
      font-size:13px;color:#a0c4ff;line-height:1.6;text-align:left;
    }
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      margin-top:20px;padding:14px 28px;width:100%;box-sizing:border-box;
      background:#1877f2;color:#fff;
      border:none;border-radius:12px;
      font-size:16px;font-weight:600;
      cursor:pointer;text-decoration:none;
      transition:opacity .15s;
    }
    .btn:hover{opacity:.85}
    .btn-sec{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      margin-top:10px;padding:12px 28px;width:100%;box-sizing:border-box;
      background:rgba(255,255,255,0.07);color:#a0aec0;
      border:1px solid rgba(255,255,255,0.1);border-radius:12px;
      font-size:14px;cursor:pointer;text-decoration:none;
    }
    </style>
    </head>
    <body>
    <div class="c" id="main">
      <div class="i">🔵</div>
      <h2>Connexion Facebook…</h2>
      <p>Redirection en cours…</p>
      <a id="fallback" class="btn" style="display:none">Ouvrir Facebook</a>
    </div>
    <script>
      var params   = new URLSearchParams(window.location.search);
      var oauthUrl = params.get('to');
      var isAdd    = params.get('add') === '1';

      if (!oauthUrl) {
        document.querySelector('p').textContent = 'Lien invalide. Retourne sur Telegram et r\u00e9essaie.';
      } else if (isAdd) {
            // Flux "ajouter un autre compte" :
            // auth_type=reauthenticate → ouvre l'app Facebook sur Android : retiré.
            // Solution : UI deux étapes.
            //   Étape 1 — l'utilisateur se déconnecte via un nouvel onglet (window.open).
            //   Étape 2 — il revient et clique "Continuer" → window.location.replace(oauthUrl)
            //             depuis Vercel (domaine tiers) → reste dans le navigateur.
            function goOAuth() { window.location.replace(oauthUrl); }
            document.getElementById('main').innerHTML =
              '<div class="i">&#128100;</div>' +
              '<h2>Ajouter un autre compte</h2>' +
              '<p>Pour connecter un <strong>compte diff&eacute;rent</strong>, suivez ces 2 &eacute;tapes&nbsp;:</p>' +
              '<div class="note">' +
                '<strong>&Eacute;tape 1</strong> &mdash; D&eacute;connectez-vous de Facebook&nbsp;:<br>' +
                '<small>Un nouvel onglet va s&apos;ouvrir. D&eacute;connectez-vous, puis revenez ici.</small>' +
              '</div>' +
              '<button id="btn-logout" class="btn" style="margin-top:16px">&#128274;&nbsp; Me d&eacute;connecter de Facebook</button>' +
              '<div class="note" id="step2" style="display:none;margin-top:12px">' +
                '<strong>&Eacute;tape 2</strong> &mdash; Connectez-vous avec le nouveau compte&nbsp;:' +
              '</div>' +
              '<button id="btn-oauth" class="btn" style="display:none;margin-top:10px;background:#42b72a">&#10003;&nbsp; J&apos;ai chang&eacute; de compte &mdash; Continuer</button>';

            document.getElementById('btn-logout').onclick = function() {
              window.open('https://www.facebook.com/logout', '_blank');
              setTimeout(function() {
                var s2  = document.getElementById('step2');
                var btn = document.getElementById('btn-oauth');
                if (s2)  s2.style.display  = 'block';
                if (btn) btn.style.display = 'inline-flex';
              }, 2000);
            };
            document.getElementById('btn-oauth').onclick = goOAuth;
          } else {
        // Connexion initiale : redirection automatique vers Facebook OAuth
        window.location.replace(oauthUrl);
        setTimeout(function() {
          var btn = document.getElementById('fallback');
          if (btn) {
            btn.href = oauthUrl;
            btn.style.display = 'inline-flex';
            document.querySelector('p').textContent = "Si la page ne s'ouvre pas automatiquement, appuie sur le bouton.";
          }
        }, 1500);
      }
    </script>
    </body>
    </html>
