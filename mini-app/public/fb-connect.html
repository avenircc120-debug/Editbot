<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Connexion Facebook…</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.c{background:#1a1f2e;border:1px solid #2d3748;border-radius:16px;padding:40px;max-width:420px;width:100%;text-align:center}
.i{font-size:48px;margin-bottom:16px}
h2{color:#fff;font-size:20px;margin-bottom:12px}
p{color:#a0aec0;line-height:1.7;font-size:14px;margin-bottom:0}
.note{background:rgba(24,119,242,0.12);border:1px solid rgba(24,119,242,0.3);border-radius:10px;padding:14px 16px;margin:18px 0 0;font-size:13px;color:#a0c4ff;line-height:1.6;text-align:left}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;padding:14px 28px;width:100%;box-sizing:border-box;background:#1877f2;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-add{display:inline-flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;padding:13px 24px;width:100%;box-sizing:border-box;background:rgba(24,119,242,0.15);color:#a0c4ff;border:1px solid rgba(24,119,242,0.3);border-radius:12px;font-size:15px;cursor:pointer;transition:opacity .15s}
.btn-add:hover{opacity:.85}
.btn-sec{display:block;margin-top:12px;font-size:13px;color:#718096;cursor:pointer;background:none;border:none;text-decoration:underline}
</style>
</head>
<body>
<div class="c" id="main">
  <div class="i" id="icon">🔵</div>
  <h2 id="titre">Connexion Facebook…</h2>
  <p id="corps">Initialisation du SDK…</p>
  <div id="actions"></div>
</div>
<script>
  var params = new URLSearchParams(window.location.search);
  var appId  = params.get('appId');
  var nonce  = params.get('nonce');
  var apiUrl = (params.get('api') || '').replace(/\/+$/, '');
  var isAdd  = params.get('add') === '1';

  function setIcon(v)  { document.getElementById('icon').textContent  = v; }
  function setTitre(v) { document.getElementById('titre').textContent = v; }
  function setCorps(v) { document.getElementById('corps').textContent = v; }
  function clearAct()  { document.getElementById('actions').innerHTML = ''; }

  function addBtn(html, cls, fn) {
    var b = document.createElement('button');
    b.className = cls; b.innerHTML = html; b.onclick = fn;
    document.getElementById('actions').appendChild(b);
    return b;
  }

  function goTelegram() {
    try { window.close(); } catch(e) {}
    setTimeout(function() { window.location.href = 'tg://'; }, 300);
  }

  function showSuccess(names, addUrl) {
    setIcon('✅'); setTitre('Facebook connecté !');
    setCorps('Tes pages (' + (names || []).join(', ') + ') sont connectées. Tu peux fermer cette page et retourner sur Telegram.');
    clearAct();
    if (addUrl) {
      addBtn('➕ Ajouter un autre compte Facebook', 'btn-add', function() { window.location.href = addUrl; });
    }
    addBtn('✓ Retourner sur Telegram', 'btn', goTelegram);
    var h = document.createElement('p');
    h.className = 'btn-sec';
    h.textContent = 'Si le bouton ne fonctionne pas, ferme ce navigateur manuellement.';
    document.getElementById('actions').appendChild(h);
  }

  function showError(msg) {
    setIcon('❌'); setTitre('Erreur de connexion');
    setCorps(msg || 'Une erreur est survenue. Retourne sur Telegram et réessaie.');
    clearAct();
    addBtn('↩ Retourner sur Telegram', 'btn', goTelegram);
  }

  function showCancelled() {
    setIcon('🚫'); setTitre('Connexion annulée');
    setCorps("Tu as refusé l'accès. Retourne sur Telegram et clique à nouveau sur «Connecter Facebook» si tu veux recommencer.");
    clearAct();
    addBtn('↩ Retourner sur Telegram', 'btn', goTelegram);
  }

  /* ── Fallback : ancien flux redirect (?to=…) ─────────────────────────────── */
  if (!appId && params.get('to')) {
    var oauthUrl = params.get('to');
    if (!oauthUrl) {
      setIcon('❌'); setCorps('Lien invalide. Retourne sur Telegram et réessaie.');
    } else if (isAdd) {
      document.getElementById('main').innerHTML =
        '<div class="i">👤</div><h2>Ajouter un autre compte</h2>' +
        '<p>Pour connecter un <strong>compte différent</strong>, suivez ces 2 étapes :</p>' +
        '<div class="note"><strong>Étape 1</strong> — Déconnectez-vous de Facebook :<br><small>Un nouvel onglet va s\'ouvrir. Déconnectez-vous, puis revenez ici.</small></div>' +
        '<button id="btn-logout" class="btn" style="margin-top:16px">🔒 Me déconnecter de Facebook</button>' +
        '<div class="note" id="step2" style="display:none;margin-top:12px"><strong>Étape 2</strong> — Connectez-vous avec le nouveau compte :</div>' +
        '<button id="btn-oauth" class="btn" style="display:none;margin-top:10px;background:#42b72a">✓ J\'ai changé de compte — Continuer</button>';
      document.getElementById('btn-logout').onclick = function() {
        window.open('https://www.facebook.com/logout', '_blank');
        setTimeout(function() {
          var s = document.getElementById('step2'), b = document.getElementById('btn-oauth');
          if (s) s.style.display = 'block';
          if (b) b.style.display = 'inline-flex';
        }, 2000);
      };
      document.getElementById('btn-oauth').onclick = function() { window.location.replace(oauthUrl); };
    } else {
      setCorps('Redirection en cours…');
      window.location.replace(oauthUrl);
      setTimeout(function() {
        var a = document.createElement('a');
        a.className = 'btn'; a.href = oauthUrl; a.textContent = 'Ouvrir Facebook';
        setCorps("Si la page ne s'ouvre pas automatiquement, appuie sur le bouton.");
        document.getElementById('actions').appendChild(a);
      }, 1500);
    }

  /* ── Nouveau flux SDK JS Facebook (?appId=…&nonce=…&api=…) ──────────────── */
  } else if (appId && nonce && apiUrl) {
    setCorps('Connexion à Facebook en cours…');

    function doLogin() {
      FB.login(function(response) {
        if (response.authResponse) {
          var token = response.authResponse.accessToken;
          setIcon('⏳'); setTitre('Finalisation…'); setCorps('Enregistrement de vos Pages Facebook…'); clearAct();
          fetch(apiUrl + '/functions/v1/facebook-oauth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: token, nonce: nonce })
          })
          .then(function(r) { return r.json(); })
          .then(function(d) {
            if (d.ok) { showSuccess(d.pages, d.addUrl); }
            else      { showError(d.error); }
          })
          .catch(function() {
            showError('Impossible de contacter le serveur. Vérifie ta connexion et réessaie.');
          });
        } else {
          showCancelled();
        }
      }, { scope: 'pages_manage_posts,pages_read_engagement,pages_show_list' });
    }

    window.fbAsyncInit = function() {
      FB.init({ appId: appId, cookie: true, xfbml: false, version: 'v22.0' });
      FB.AppEvents.logPageView();
      doLogin();
    };

    (function(d, s, id) {
      var js, fjs = d.getElementsByTagName(s)[0];
      if (d.getElementById(id)) { return; }
      js = d.createElement(s); js.id = id;
      js.src = 'https://connect.facebook.net/fr_FR/sdk.js';
      fjs.parentNode.insertBefore(js, fjs);
    }(document, 'script', 'facebook-jssdk'));

  } else {
    setIcon('❌'); setCorps('Paramètres manquants. Retourne sur Telegram et réessaie.');
  }
</script>
</body>
</html>
